<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <marker id="arrow-acid" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a3e635"/>
    </marker>
    <marker id="arrow-ice" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#67e8f9"/>
    </marker>
    <marker id="arrow-chrome" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f1f5f9"/>
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="#0f172a"/>

  <!-- Title -->
  <text x="960" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="42" font-weight="700" fill="#f1f5f9">Calling other agents from Claude Code</text>

  <!-- ═══════════════════ Context boundary dashed box ═══════════════════ -->
  <rect x="60" y="110" width="900" height="670" rx="12" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="12,6"/>
  <text x="80" y="145" font-family="Inter, sans-serif" font-size="18" fill="#334155">Claude Code session context</text>

  <!-- ═══════════════════ LEFT: Claude Code session panel ═══════════════════ -->
  <rect x="100" y="170" width="820" height="570" rx="8" fill="#1e293b" stroke="#a3e635" stroke-width="2.5"/>

  <!-- Session header -->
  <text x="150" y="220" font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="#a3e635">Claude Code session</text>

  <!-- Conversation flow -->
  <!-- User message 1 -->
  <rect x="150" y="250" width="600" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="175" y="282" font-family="'JetBrains Mono', monospace" font-size="18" fill="#f1f5f9">&gt; Analyze this article and review my code</text>

  <!-- Claude thinking -->
  <rect x="150" y="320" width="600" height="50" rx="6" fill="#0f172a" stroke="#a3e635" stroke-width="1"/>
  <text x="175" y="352" font-family="Inter, sans-serif" font-size="18" fill="#a3e635">Claude delegates to external agents...</text>

  <!-- Subprocess call 1 -->
  <rect x="150" y="400" width="600" height="50" rx="6" fill="#0f172a" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="175" y="432" font-family="'JetBrains Mono', monospace" font-size="16" fill="#67e8f9">subprocess: gemini -p "summarize..."</text>

  <!-- Subprocess call 2 -->
  <rect x="150" y="470" width="600" height="50" rx="6" fill="#0f172a" stroke="#f1f5f9" stroke-width="1.5"/>
  <text x="175" y="502" font-family="'JetBrains Mono', monospace" font-size="16" fill="#f1f5f9">subprocess: copilot -p "review..."</text>

  <!-- Result integration -->
  <rect x="150" y="550" width="720" height="50" rx="6" fill="#0f172a" stroke="#a3e635" stroke-width="1"/>
  <text x="175" y="582" font-family="Inter, sans-serif" font-size="18" fill="#a3e635">Claude integrates both results into its response</text>

  <!-- Final answer -->
  <rect x="150" y="620" width="720" height="90" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="175" y="655" font-family="Inter, sans-serif" font-size="18" fill="#f1f5f9">Combined answer: article summary from Gemini +</text>
  <text x="175" y="685" font-family="Inter, sans-serif" font-size="18" fill="#f1f5f9">code review from Copilot, merged into one response</text>

  <!-- ═══════════════════ Context boundary label (right side) ═══════════════════ -->
  <text x="990" y="460" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#334155" transform="rotate(90 990 460)">Context boundary</text>

  <!-- ═══════════════════ RIGHT: External agent panels ═══════════════════ -->

  <!-- Gemini panel -->
  <rect x="1060" y="170" width="790" height="250" rx="8" fill="#1e293b" stroke="#67e8f9" stroke-width="2"/>
  <text x="1110" y="215" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#67e8f9">Gemini CLI</text>
  <rect x="1110" y="240" width="690" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1135" y="272" font-family="'JetBrains Mono', monospace" font-size="18" fill="#67e8f9">gemini -p "summarize this article"</text>
  <text x="1110" y="330" font-family="Inter, sans-serif" font-size="20" fill="#94a3b8">Fresh session. No access to Claude's</text>
  <text x="1110" y="358" font-family="Inter, sans-serif" font-size="20" fill="#94a3b8">context, history, or files it has open.</text>

  <!-- Copilot panel -->
  <rect x="1060" y="470" width="790" height="250" rx="8" fill="#1e293b" stroke="#f1f5f9" stroke-width="2"/>
  <text x="1110" y="515" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#f1f5f9">GitHub Copilot CLI</text>
  <rect x="1110" y="540" width="690" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1135" y="572" font-family="'JetBrains Mono', monospace" font-size="18" fill="#f1f5f9">copilot -p "review this code"</text>
  <text x="1110" y="630" font-family="Inter, sans-serif" font-size="20" fill="#94a3b8">Fresh session. No shared memory.</text>
  <text x="1110" y="658" font-family="Inter, sans-serif" font-size="20" fill="#94a3b8">Only sees what's passed as input.</text>

  <!-- ═══════════════════ Arrows: outbound ═══════════════════ -->
  <!-- Claude → Gemini -->
  <line x1="920" y1="425" x2="1050" y2="300" stroke="#67e8f9" stroke-width="2" marker-end="url(#arrow-ice)"/>

  <!-- Claude → Copilot -->
  <line x1="920" y1="495" x2="1050" y2="590" stroke="#f1f5f9" stroke-width="2" marker-end="url(#arrow-chrome)"/>

  <!-- ═══════════════════ Arrows: return ═══════════════════ -->
  <!-- Gemini → Claude -->
  <line x1="1050" y1="360" x2="920" y2="565" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-muted)"/>
  <text x="935" y="480" font-family="Inter, sans-serif" font-size="16" fill="#94a3b8" transform="rotate(-30 935 480)">Returns text</text>

  <!-- Copilot → Claude -->
  <line x1="1050" y1="650" x2="920" y2="600" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-muted)"/>
  <text x="935" y="640" font-family="Inter, sans-serif" font-size="16" fill="#94a3b8" transform="rotate(10 935 640)">Returns text</text>

  <!-- ═══════════════════ Callout box at bottom ═══════════════════ -->
  <rect x="120" y="860" width="1680" height="120" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="2"/>
  <text x="960" y="905" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#f87171">Each subprocess is a fresh session — no shared context</text>
  <text x="960" y="945" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" fill="#94a3b8">The calling agent only sees the returned text. External agents cannot access Claude's files, history, or tools.</text>
</svg>